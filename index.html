<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Guide Catholic</title>
    
    <!-- Author and Publisher -->
    <meta name="author" content="Guide Catholic" />
    <meta name="publisher" content="Guide Catholic" />
    <meta property="article:publisher" content="Guide Catholic" />
    
    <!-- Robots Meta Tags -->
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <meta name="googlebot" content="index, follow" />
    <meta name="bingbot" content="index, follow" />
    
    <!-- Site Verification and Ownership -->
    <meta name="application-name" content="Guide Catholic" />
    <meta name="apple-mobile-web-app-title" content="Guide Catholic" />

    <!-- Preconnect to font origins (reduces DNS + TLS latency) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Fonts loaded via <link> instead of CSS @import (faster render) -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Source+Sans+3:wght@300;400;500;600&display=swap"
    />

    <!-- Preload favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Critical CSS: prevents white flash before JS loads -->
    <style>
      body { background-color: #faf9f7; margin: 0; }
      #root { min-height: 100vh; }
    </style>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
